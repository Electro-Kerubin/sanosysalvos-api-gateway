server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - http://localhost:3000
              - http://127.0.0.1:3000
              - https://*.vercel.app
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders:
              - Authorization
              - Content-Type
              - X-Correlation-Id
              - X-Request-Id
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: auth-service
          uri: http://sanosysalvos-auth-service:8081
          predicates:
            - Path=/api/auth/**

        - id: reportes-service
          uri: http://sanosysalvos-reportes-service:8082
          predicates:
            - Path=/api/reportes/**

        - id: geolocation-service
          uri: http://sanosysalvos-geolocation-service:8084
          predicates:
            - Path=/api/geo/**

        - id: matching-service
          uri: http://sanosysalvos-matching-service:8083
          predicates:
            - Path=/api/matching/**

        - id: matching-service-legacy-alias
          uri: http://sanosysalvos-matching-service:8083
          predicates:
            - Path=/api/coincidencias/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always