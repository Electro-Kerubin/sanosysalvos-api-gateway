server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - RemoveRequestHeader=Cookie
      globalcors:
        add-to-auto-webflux-endpoint: true
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders:
              - X-Correlation-Id
              - X-Request-Id
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - PreserveHostHeader

        - id: usuarios-service
          uri: ${USUARIOS_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/usuarios/**

        - id: reportes-service
          uri: ${REPORTE_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/reportes/**

        - id: mascotas-service
          uri: ${MASCOTAS_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/mascotas/**

        - id: contactos-service
          uri: ${CONTACTOS_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/contactos/**

        - id: especies-service
          uri: ${ESPECIES_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/especies/**

        - id: razas-service
          uri: ${RAZAS_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/razas/**

        - id: geolocalizacion-service
          uri: ${GEO_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/api/geo/**

        - id: coincidencias-service
          uri: ${MATCH_SERVICE_URL:http://localhost:8089}
          predicates:
            - Path=/api/coincidencias/**

        - id: notificaciones-service
          uri: ${NOTIFY_SERVICE_URL:http://localhost:8090}
          predicates:
            - Path=/api/notificaciones/**

        - id: storage-service
          uri: ${STORAGE_SERVICE_URL:http://localhost:8091}
          predicates:
            - Path=/api/storage/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always